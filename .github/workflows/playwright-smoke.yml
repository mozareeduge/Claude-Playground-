name: Playwright Smoke

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - codex/id-singularity-rno-content
      - claude/id-singularity-rno-content

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:data
      - run: npm test
